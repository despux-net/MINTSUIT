backend:
  name: github
  repo: despux-net/MINTSUIT
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - file: "data/site.json"
        label: "Homepage Content"
        name: "homepage"
        fields:
          - { label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string" }
          - { label: "Hero Cover Image", name: "hero_image", widget: "image" }
          - { label: "Hero Button Text", name: "hero_cta_label", widget: "string" }
          - { label: "Hero Button Link", name: "hero_cta_url", widget: "string" }
          - { label: "Bandcamp Track ID", name: "bandcamp_track_id", widget: "string", hint: "Makes the Hero Button open a floating Bandcamp player with a Buy button instead of leaving the site. Find this number by opening the track on Bandcamp, right-click → View Page Source, and search for track_id." }
          - { label: "Hero Title — Vertical Position", name: "hero_title_lift", widget: "number", hint: "How far up to lift the MINT SUIT title from the bottom of the image, in pixels. Positive = higher up, negative = lower down (can go below the default position). Try changing by 20-30 at a time.", value_type: "int", min: -400, max: 400 }
          - { label: "Listen Button — Spacing from Title", name: "hero_cta_gap", widget: "number", hint: "Space between the title and the 'Listen to «Redamancy»' text, in pixels. Positive = further apart, negative = closer together or overlapping.", value_type: "int", min: -200, max: 200 }
          - { label: "Music Description", name: "music_description", widget: "text" }
          - { label: "Spotify Album ID", name: "spotify_album_id", widget: "string", hint: "The id in your Spotify album URL: open.spotify.com/album/THIS-PART" }
          - { label: "Video Title", name: "video_title", widget: "string" }
          - { label: "YouTube Video ID", name: "youtube_id", widget: "string", hint: "The id in the YouTube URL: youtube.com/watch?v=THIS-PART" }
          - { label: "About Image", name: "about_image", widget: "image" }
          - { label: "About Paragraph 1", name: "about_p1", widget: "text" }
          - { label: "About Paragraph 2", name: "about_p2", widget: "text" }
          - label: "Genre Tags"
            name: "tags"
            widget: "list"
          - { label: "Connect Intro", name: "connect_intro", widget: "string" }

      - file: "data/links.json"
        label: "Streaming & Social Links"
        name: "links"
        fields:
          - label: "Streaming Links"
            name: "streaming"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Social Links"
            name: "social"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - file: "data/design.json"
        label: "Design & Appearance"
        name: "design"
        fields:
          - { label: "Heading Font", name: "heading_font", widget: "select", options: ["Bodoni Moda", "Playfair Display", "Cormorant Garamond", "DM Serif Display"], hint: "Used for MINT SUIT and all section titles." }
          - { label: "Body Font", name: "body_font", widget: "select", options: ["Jost", "Inter", "Work Sans", "Space Grotesk"], hint: "Used for paragraphs, nav, buttons, and labels." }
          - { label: "Heading Size", name: "heading_scale", widget: "number", value_type: "int", min: 60, max: 160, hint: "Percent. 100 = normal, 120 = 20% bigger, 80 = 20% smaller." }
          - { label: "Body Text Size", name: "body_scale", widget: "number", value_type: "int", min: 60, max: 160, hint: "Percent. 100 = normal, 120 = 20% bigger, 80 = 20% smaller." }
          - { label: "Page Background Color", name: "bg_color", widget: "color", hint: "Main background behind all text sections." }
          - { label: "Text Color", name: "text_color", widget: "color", hint: "Main color for titles and paragraphs." }
          - { label: "Hero Image Frame Color", name: "hero_bg_color", widget: "color", hint: "Shows briefly behind the hero photo while it loads." }
          - { label: "About Section Background", name: "about_bg_color", widget: "color" }
          - { label: "Music Section Background", name: "music_bg_color", widget: "color" }
          - { label: "Connect Section Background", name: "connect_bg_color", widget: "color" }
          - { label: "Video Tint Color", name: "video_veil_color", widget: "color", hint: "Tint over the video that keeps the text readable." }
          - { label: "Hero Photo Vertical Focus", name: "hero_image_focus_y", widget: "number", value_type: "int", min: 0, max: 100, hint: "Which part of the hero photo stays centered. 0 = top of photo, 100 = bottom of photo." }
